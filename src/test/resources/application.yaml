spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:outbox_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092

outbox:
  publisher:
    enabled: false
